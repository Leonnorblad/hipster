<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hipster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #111;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #reader {
      width: min(90vw, 400px);
      border-radius: 12px;
      overflow: hidden;
    }
    #reader video { border-radius: 12px; }
    #status {
      margin-top: 24px;
      font-size: 1.2rem;
      text-align: center;
    }
    .btn {
      margin-top: 24px;
      padding: 14px 32px;
      font-size: 1.1rem;
      background: #1DB954;
      color: #fff;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:active { opacity: 0.8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="reader" class="hidden"></div>
  <div id="status"></div>
  <button id="scanBtn" class="btn" onclick="startScan()">Scan QR Code</button>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    let scanner = null;

    // If we redirected last time, reset to clean state
    if (sessionStorage.getItem('redirected')) {
      sessionStorage.removeItem('redirected');
    }

    // Also handle bfcache restore
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        sessionStorage.removeItem('redirected');
        document.getElementById('reader').classList.add('hidden');
        document.getElementById('scanBtn').classList.remove('hidden');
        document.getElementById('status').textContent = '';
        if (scanner) {
          try { scanner.stop(); } catch(e) {}
          scanner = null;
        }
      }
    });

    function startScan() {
      document.getElementById('scanBtn').classList.add('hidden');
      document.getElementById('reader').classList.remove('hidden');
      document.getElementById('status').textContent = '';

      scanner = new Html5Qrcode('reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
      ).catch(() => {
        document.getElementById('status').textContent = 'Camera access denied';
        setTimeout(() => document.getElementById('scanBtn').classList.remove('hidden'), 1500);
      });
    }

    function onScanSuccess(decodedText) {
      scanner.stop().then(() => {
        scanner = null;
        document.getElementById('reader').classList.add('hidden');

        if (!decodedText.includes('hitsternordics.com')) {
          document.getElementById('status').textContent = 'Not a Hitster link. Try again.';
          setTimeout(() => document.getElementById('scanBtn').classList.remove('hidden'), 1500);
          return;
        }

        let remaining = 3;
        document.getElementById('status').textContent = `Found! Opening in ${remaining}...`;

        const interval = setInterval(() => {
          remaining--;
          if (remaining <= 0) {
            clearInterval(interval);
            sessionStorage.setItem('redirected', '1');
            window.location.href = decodedText;
          } else {
            document.getElementById('status').textContent = `Found! Opening in ${remaining}...`;
          }
        }, 1000);
      });
    }
  </script>
</body>
</html>
