<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hipster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #111;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #reader {
      width: min(90vw, 400px);
      border-radius: 12px;
      overflow: hidden;
    }
    #reader video { border-radius: 12px; }
    #status {
      margin-top: 24px;
      font-size: 1.2rem;
      text-align: center;
    }
    .btn {
      margin-top: 24px;
      padding: 14px 32px;
      font-size: 1.1rem;
      background: #1DB954;
      color: #fff;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:active { opacity: 0.8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="reader" class="hidden"></div>
  <div id="status"></div>
  <button id="scanBtn" class="btn" onclick="startScan()">Scan QR Code</button>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    let scanner = null;

    function startScan() {
      document.getElementById('scanBtn').classList.add('hidden');
      document.getElementById('reader').classList.remove('hidden');
      document.getElementById('status').textContent = '';

      scanner = new Html5Qrcode('reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
      ).catch(() => {
        document.getElementById('status').textContent = 'Camera access denied';
        setTimeout(() => document.getElementById('scanBtn').classList.remove('hidden'), 1500);
      });
    }

    function onScanSuccess(decodedText) {
      scanner.stop().then(() => {
        scanner = null;
        document.getElementById('reader').classList.add('hidden');

        if (!decodedText.includes('hitsternordics.com')) {
          document.getElementById('status').textContent = 'Not a Hitster link. Try again.';
          setTimeout(() => document.getElementById('scanBtn').classList.remove('hidden'), 1500);
          return;
        }

        // Resolve the hitster URL to get the Spotify track ID
        document.getElementById('status').textContent = 'Found! Resolving song...';

        resolveSpotifyUri(decodedText).then((spotifyUri) => {
          let remaining = 3;
          document.getElementById('status').textContent = `Opening in ${remaining}...`;

          const interval = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
              clearInterval(interval);
              document.getElementById('status').textContent = '';
              document.getElementById('scanBtn').classList.remove('hidden');
              // spotify: URI scheme opens the app directly, no tap needed
              window.location.href = spotifyUri;
            } else {
              document.getElementById('status').textContent = `Opening in ${remaining}...`;
            }
          }, 1000);
        }).catch(() => {
          document.getElementById('status').textContent = 'Could not resolve song. Try again.';
          setTimeout(() => document.getElementById('scanBtn').classList.remove('hidden'), 1500);
        });
      });
    }

    async function resolveSpotifyUri(hitsterUrl) {
      // Fetch the hitster URL via a CORS proxy to get the redirect Location
      // The hitster URL 302-redirects to https://open.spotify.com/track/XXXX
      const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(hitsterUrl);
      const resp = await fetch(proxyUrl, { redirect: 'manual' });

      // corsproxy.io follows redirects, so we get the Spotify page
      // Extract track ID from the final URL or response
      const finalUrl = resp.url;
      const match = finalUrl.match(/open\.spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);
      if (match) {
        return `spotify:${match[1]}:${match[2]}`;
      }

      // Fallback: parse the response body for Spotify URLs
      const text = await resp.text();
      const bodyMatch = text.match(/open\.spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);
      if (bodyMatch) {
        return `spotify:${bodyMatch[1]}:${bodyMatch[2]}`;
      }

      throw new Error('No Spotify track found');
    }
  </script>
</body>
</html>
